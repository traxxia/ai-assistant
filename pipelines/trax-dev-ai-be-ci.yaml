name: TRAXXIA-$(Date:yyyyMMdd)-$(Rev:r)

# ─────────────────────────────────────────
# CI triggers on main and develop branches
# ─────────────────────────────────────────
trigger:
  branches:
    include:
      - main
      - deployment

pr:
  branches:
    include:
      - main
      - deployment

# ─────────────────────────────────────────
# Variables
# ─────────────────────────────────────────
variables:
  MAJOR: 1
  MINOR: 0
  PATCH: $[counter(format('{0}.{1}', variables['MAJOR'], variables['MINOR']), 0)]
  SEMVER: $(MAJOR).$(MINOR).$(PATCH)
  IMAGE_VERSION: $(SEMVER)
  IMAGE_NAME: traxxia_dev_ai_assistant

# ─────────────────────────────────────────
# Stages
# ─────────────────────────────────────────
stages:
  - stage: BuildAndPush
    displayName: Build and Push Docker Image for Traxxia AI Backend
    jobs:
      - job: BuildJob
        displayName: Build Docker Image and Push to ACR
        pool:
          vmImage: 'ubuntu-latest'

        steps:
          - checkout: self
            clean: true
            fetchDepth: 1

          # Build & push to ACR
          - task: Docker@2
            displayName: 'Build and Push Traxxia AI Backend Docker Image to ACR'
            inputs:
              containerRegistry: 'trax-sc-dev-acr'   # Azure DevOps service connection name for ACR
              repository: $(IMAGE_NAME)
              command: buildAndPush
              Dockerfile: 'docker/Dockerfile'
              buildContext: '$(Build.SourcesDirectory)'
              tags: |
                latest
                $(IMAGE_VERSION)

          - script: echo "Docker Image tagged as $(IMAGE_NAME):$(IMAGE_VERSION)"
            displayName: 'Output Traxxia AI Backend Docker Tag'

          # Publish the image tag as a pipeline artifact so CD can consume it
          - script: echo "$(IMAGE_VERSION)" > $(Build.ArtifactStagingDirectory)/image_version.txt
            displayName: 'Save Image Version'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Image Version Artifact'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)'
              artifact: 'build-meta'
              publishLocation: 'pipeline'
